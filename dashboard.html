.header::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(20,16,10,0.65) 0%, rgba(20,16,10,0.5) 60%, rgba(20,16,10,0.75) 100%);
}
.header > * { position:relative; z-index:1; }
.header::after { content:''; position:absolute; bottom:0; left:15%; right:15%; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
.header-pre { font-family:'Cinzel',serif; font-size:10px; letter-spacing:5px; color:var(--gold-light); text-transform:uppercase; display:block; margin-bottom:8px; }
.header-title { font-family:'Cormorant Garamond',serif; font-size:clamp(24px,5vw,36px); font-weight:300; color:#fff; letter-spacing:-1px; }
.header-title span { color:var(--gold); font-style:italic; }
.header-date { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.6); text-transform:uppercase; margin-top:6px; display:block; }
.last-update { font-family:'EB Garamond',serif; font-style:italic; font-size:12px; color:rgba(255,255,255,0.3); margin-top:8px; display:block; }

.summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; padding:24px 20px 0; max-width:900px; margin:0 auto; }
@media(max-width:600px){ .summary{ grid-template-columns:repeat(2,1fr); } }
.summary-card { background:#fff; padding:18px 16px; text-align:center; border-top:3px solid transparent; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.summary-card.total { border-color:var(--gold); }
.summary-card.yes { border-color:var(--yes); }
.summary-card.no { border-color:var(--no); }
.summary-card.pending { border-color:var(--pending); }
.summary-num { font-family:'Cinzel',serif; font-size:clamp(28px,6vw,40px); font-weight:600; line-height:1; display:block; }
.summary-card.total .summary-num { color:var(--gold-dark); }
.summary-card.yes .summary-num { color:var(--yes); }
.summary-card.no .summary-num { color:var(--no); }
.summary-card.pending .summary-num { color:var(--pending); }
.summary-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; color:#888; text-transform:uppercase; margin-top:6px; display:block; }
.summary-pct { font-family:'EB Garamond',serif; font-size:15px; color:#aaa; margin-top:3px; display:block; }

.progress-wrap { max-width:900px; margin:16px auto 0; padding:0 20px; }
.progress-bar { height:6px; background:#e0d8cc; display:flex; overflow:hidden; border-radius:3px; }
.pb-yes { background:var(--yes); transition:width 0.8s ease; }
.pb-no { background:var(--no); transition:width 0.8s ease; }
.pb-pending { background:var(--gold); transition:width 0.8s ease; }

.top-bar { max-width:900px; margin:20px auto 0; padding:0 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.top-bar-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; color:var(--gold-dark); text-transform:uppercase; }
.refresh-btn { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--dark); background:linear-gradient(135deg,var(--gold-light),var(--gold)); border:none; padding:12px 28px; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
.refresh-btn:hover { opacity:0.85; }

.filters { max-width:900px; margin:12px auto 0; padding:0 20px; display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:10px 18px; border:1px solid rgba(201,168,76,0.3); background:transparent; color:var(--gold-dark); cursor:pointer; transition:all 0.2s; }
.filter-btn:hover,.filter-btn.active { background:var(--dark-mid); color:var(--gold-light); border-color:var(--dark-mid); }

.search-wrap { max-width:900px; margin:10px auto 0; padding:0 20px; }
.search-input { width:100%; font-family:'EB Garamond',serif; font-size:18px; padding:12px 18px; border:1px solid rgba(201,168,76,0.3); background:#fff; color:var(--dark-mid); outline:none; }
.search-input:focus { border-color:var(--gold); }

.table-wrap { max-width:900px; margin:16px auto 40px; padding:0 20px; }
.data-table { width:100%; border-collapse:collapse; background:#fff; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.data-table th { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#fff; background:var(--dark-mid); padding:14px 16px; text-align:left; }
.data-table td { font-family:'EB Garamond',serif; font-size:19px; padding:14px 16px; border-bottom:1px solid rgba(201,168,76,0.1); color:var(--dark-mid); }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:rgba(201,168,76,0.04); }
.status-badge { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; display:inline-block; }

/* Mobile responsiveness */
@media(max-width:600px){
  .data-table th:nth-child(2), .data-table td:nth-child(2),
  .data-table th:nth-child(4), .data-table td:nth-child(4) { display:none; }
  .data-table th { font-size:8px; padding:12px 10px; }
  .data-table td { font-size:15px; padding:10px; }
  .filters { gap:6px; }
  .filter-btn { font-size:8px; padding:8px 10px; }
  .top-bar-title { font-size:9px; }
  .refresh-btn { font-size:8px; padding:10px 16px; }
  .search-input { font-size:16px; }
  .summary-label { font-size:8px; }
  .summary-pct { font-size:13px; }
  .header-pre { font-size:9px; }
  .header-date { font-size:9px; }
}
.status-badge.yes { background:var(--yes-light); color:var(--yes); }
.status-badge.no { background:var(--no-light); color:var(--no); }
.status-badge.pending { background:var(--pending-light); color:var(--pending); }

.loading { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--gold-dark); text-transform:uppercase; }
.loading-spinner { width:32px; height:32px; border:2px solid rgba(201,168,76,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; color:#bbb; }
</style>
</head>
<body>

<div class="header">
  <span class="header-pre">— Dashboard de Confirmações —</span>
  <div class="header-title">Isabella <span>&</span> Samuel</div>
  <span class="header-date">07 · XI · MMXXVI · Espaço Carrier · Mairiporã</span>
  <span class="last-update" id="lastUpdate">Carregando...</span>
</div>

<div class="summary">
  <div class="summary-card total"><span class="summary-num" id="numTotal">—</span><span class="summary-label">Responderam</span><span class="summary-pct" id="pctTotal">de 120 convidados</span></div>
  <div class="summary-card yes"><span class="summary-num" id="numYes">—</span><span class="summary-label">Confirmados</span><span class="summary-pct" id="pctYes">—</span></div>
  <div class="summary-card no"><span class="summary-num" id="numNo">—</span><span class="summary-label">Não vão</span><span class="summary-pct" id="pctNo">—</span></div>
  <div class="summary-card pending"><span class="summary-num" id="numPending">—</span><span class="summary-label">Pendentes</span><span class="summary-pct" id="pctPending">—</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="pb-yes" id="pbYes" style="width:0%"></div>
    <div class="pb-no" id="pbNo" style="width:0%"></div>
    <div class="pb-pending" id="pbPending" style="width:0%"></div>
  </div>
</div>

<div class="top-bar">
  <span class="top-bar-title">Lista de confirmações</span>
  <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('Confirmado',this)">✓ Confirmados</button>
  <button class="filter-btn" onclick="setFilter('Não vai',this)">✕ Não vão</button>
  <button class="filter-btn" onclick="setFilter('Pendente',this)">⏳ Pendentes</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nome ou grupo..." oninput="renderTable()">
</div>

<div class="table-wrap">
  <div id="tableContainer">
    <div class="loading"><div class="loading-spinner"></div>Buscando confirmações...</div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTHH5AkxiI7BgeUmE5Ffak93MlxE1AAQ5vFUSihYzSUjof-FOswtLxtgG2caRTIh2vF2PajarI_stG/pub?gid=822960724&single=true&output=csv';
const TOTAL = 120;
let allData = [];
let currentFilter = 'all';

async function loadData() {
  document.getElementById('tableContainer').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Buscando confirmações...</div>';
  document.getElementById('lastUpdate').textContent = 'Atualizando...';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    allData = parseCSV(text);
    updateSummary();
    renderTable();
    const now = new Date();
    document.getElementById('lastUpdate').textContent = 'Atualizado às ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty">Erro ao carregar dados. Tente novamente.</div>';
    document.getElementById('lastUpdate').textContent = 'Erro ao carregar';
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n').slice(1); // skip header
  return lines.map(line => {
    const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    return { grupoId: cols[0], nome: cols[1], status: cols[2], atualizacao: cols[4] };
  }).filter(r => r.nome);
}

function updateSummary() {
  const yes = allData.filter(r => r.status === 'Confirmado').length;
  const no  = allData.filter(r => r.status === 'Não vai').length;
  const pend = allData.filter(r => r.status === 'Pendente').length;
  const total = allData.length;
  document.getElementById('numTotal').textContent = total;
  document.getElementById('numYes').textContent = yes;
  document.getElementById('numNo').textContent = no;
  document.getElementById('numPending').textContent = pend;
  document.getElementById('pctTotal').textContent = 'de ' + TOTAL + ' convidados';
  document.getElementById('pctYes').textContent = total ? Math.round(yes/total*100) + '% das respostas' : '—';
  document.getElementById('pctNo').textContent = total ? Math.round(no/total*100) + '% das respostas' : '—';
  document.getElementById('pctPending').textContent = total ? Math.round(pend/total*100) + '% das respostas' : '—';
  document.getElementById('pbYes').style.width = (yes/TOTAL*100) + '%';
  document.getElementById('pbNo').style.width = (no/TOTAL*100) + '%';
  document.getElementById('pbPending').style.width = (pend/TOTAL*100) + '%';
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allData;
  if (currentFilter !== 'all') filtered = filtered.filter(r => r.status === currentFilter);
  if (search) filtered = filtered.filter(r => r.nome.toLowerCase().includes(search) || r.grupoId.toLowerCase().includes(search));

  if (!filtered.length) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty">Nenhum resultado encontrado.</div>';
    return;
  }

  const sc = { 'Confirmado':'yes', 'Não vai':'no', 'Pendente':'pending' };
  const rows = filtered.map(r => `
    <tr>
      <td>${r.nome}</td>
      <td style="font-size:12px;color:#999;">${r.grupoId.replace(/_/g,' ')}</td>
      <td><span class="status-badge ${sc[r.status]||''}">${r.status||'—'}</span></td>
      <td style="font-size:12px;color:#bbb;">${r.atualizacao ? new Date(r.atualizacao).toLocaleDateString('pt-BR') : '—'}</td>
    </tr>`).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table class="data-table">
      <thead><tr><th>Nome</th><th>Grupo</th><th>Status</th><th>Atualizado em</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
